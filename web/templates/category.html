{{define "content"}}
<section class="bg-gray-50 py-12">
    <div class="container mx-auto px-4">

        <!-- Category Header -->
        <div class="mb-12 text-center relative">
            <div class="absolute inset-0 bg-cover bg-center rounded-xl opacity-10" style="background-image: url('{{.Category.ImagePath}}'); z-index: 0;"></div>
            <div class="relative z-10 py-12">
                <h1 class="text-4xl font-bold text-primary mb-4">{{.Category.Name}}</h1>
                <p class="text-xl text-gray-600 max-w-2xl mx-auto font-medium">{{.Category.Description}}</p>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {{range .Products}}
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition duration-300 flex flex-col h-full border border-gray-100 transform hover:-translate-y-1">
                <div class="p-6 flex-grow">
                    <h3 class="text-xl font-bold text-primary mb-3 min-h-[3.5rem] flex items-center">{{.Name}}</h3>
                    <p class="text-gray-600 mb-4 text-sm leading-relaxed line-clamp-3">{{.Description}}</p>

                    {{if .Data}}
                    <div class="bg-green-50 p-3 rounded-lg mb-4 text-sm text-green-800 border border-green-100">
                        {{.Data}}
                    </div>
                    {{end}}

                    {{if .Dosage}}
                    <div class="text-xs text-gray-500 mb-2">
                        <span class="font-bold uppercase">Dawkowanie:</span> {{.Dosage}}
                    </div>
                    {{end}}
                </div>
                <div class="bg-gray-50 p-4 border-t border-gray-100 flex justify-between items-center">
                     <a href="/product/{{.ID}}" class="text-secondary font-bold hover:text-green-700 flex items-center group text-sm">
                        Więcej informacji
                        <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </a>
                </div>
            </div>
            {{end}}
        </div>

        <div class="mt-12 text-center">
            <a href="/products" class="inline-flex items-center text-primary font-semibold hover:text-secondary transition bg-white px-6 py-3 rounded-full shadow hover:shadow-lg border border-gray-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Powrót do wszystkich kategorii
            </a>
        </div>
    </div>
</section>
{{end}}
