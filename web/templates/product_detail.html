{{define "content"}}
<section class="bg-gray-50 py-12">
    <div class="container mx-auto px-4 max-w-4xl">

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-8 border border-gray-100">
            <!-- Header -->
            <div class="bg-primary text-white p-8 md:p-12 relative overflow-hidden">
                <div class="absolute inset-0 bg-cover bg-center opacity-20" style="background-image: url('/static/images/hero-bg.jpg');"></div>
                <div class="relative z-10">
                     <div class="text-sm uppercase tracking-wide text-green-300 font-bold mb-2">Szczegóły Produktu</div>
                     <h1 class="text-3xl md:text-5xl font-bold mb-4">{{.Name}}</h1>
                     <p class="text-xl opacity-90 leading-relaxed max-w-2xl">{{.Description}}</p>
                </div>
            </div>

            <div class="p-8 md:p-12">

                {{if .Data}}
                <div class="bg-green-50 p-4 md:p-6 rounded-xl mb-8 border-l-4 border-secondary shadow-sm">
                    <h3 class="text-lg font-bold text-green-900 mb-2 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Dane analityczne
                    </h3>
                    <p class="text-green-800 font-medium">{{.Data}}</p>
                </div>
                {{end}}

                <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed mb-8">
                    {{if .Content}}
                        {{.Content}}
                    {{else}}
                        <p>{{.Description}}</p>
                    {{end}}
                </div>

                {{if .Dosage}}
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-8">
                     <h3 class="text-lg font-bold text-primary mb-2 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        Dawkowanie
                    </h3>
                    <p class="text-gray-700 font-medium">{{.Dosage}}</p>
                </div>
                {{end}}

                <div class="flex flex-col md:flex-row gap-4 justify-center mt-12 pt-8 border-t border-gray-100">
                    <a href="tel:+48661017021" class="bg-secondary hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition shadow-lg flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        Zadzwoń i zamów
                    </a>
                    <a href="mailto:biuro@biomixpoland.pl" class="border-2 border-primary text-primary hover:bg-primary hover:text-white font-bold py-3 px-8 rounded-full transition flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Wyślij zapytanie
                    </a>
                </div>
            </div>
        </div>

        <div class="text-center">
             <button onclick="history.back()" class="text-gray-500 hover:text-primary transition font-semibold flex items-center justify-center mx-auto">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Wróć
            </button>
        </div>

    </div>
</section>
{{end}}
