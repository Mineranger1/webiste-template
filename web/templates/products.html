{{define "content"}}
<section class="bg-gray-50 py-12">
    <div class="container mx-auto px-4">
        <h1 class="text-4xl font-bold text-primary mb-12 text-center">Nasza Oferta</h1>

        <!-- Featured Product -->
        {{if .FeaturedProduct}}
        <div class="bg-white rounded-xl shadow-xl overflow-hidden mb-16 border-l-8 border-secondary flex flex-col md:flex-row">
             <div class="md:w-1/3 h-64 md:h-auto bg-gray-100 flex items-center justify-center bg-cover bg-center" style="background-image: url('/static/images/specjalne.jpg');">
             </div>
             <div class="p-8 md:w-2/3 flex flex-col justify-center">
                <div class="uppercase tracking-wide text-sm text-secondary font-bold mb-2">Wyróżniony Produkt</div>
                <h2 class="text-3xl font-bold text-primary mb-4">{{.FeaturedProduct.Name}}</h2>
                <p class="text-gray-600 mb-6 text-lg">{{.FeaturedProduct.Description}}</p>
                <a href="/product/{{.FeaturedProduct.ID}}" class="inline-block bg-secondary hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition w-max shadow-lg">
                    Zobacz więcej
                </a>
             </div>
        </div>
        {{end}}

        <!-- Categories Grid -->
        <h2 class="text-3xl font-bold text-center text-primary mb-8">Kategorie Produktów</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            {{range .Categories}}
            <a href="/products?category={{.Slug}}" class="group block bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition duration-300 transform hover:-translate-y-1 border border-gray-100">
                <div class="h-100 bg-gray-200 overflow-hidden relative">
                     <img src="{{.ImagePath}}" alt="{{.Name}}" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                     <div class="absolute inset-0 bg-black bg-opacity-20 group-hover:bg-opacity-10 transition"></div>
                </div>
                <div class="p-8">
                    <h3 class="text-2xl font-bold text-primary mb-3 group-hover:text-secondary transition">{{.Name}}</h3>
                    <p class="text-gray-600 leading-relaxed">{{.Description}}</p>
                    <div class="mt-6 flex items-center text-secondary font-bold group-hover:text-green-700 transition">
                        Zobacz produkty
                        <svg class="w-5 h-5 ml-2 transform group-hover:translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </div>
                </div>
            </a>
            {{end}}
        </div>
    </div>
</section>
{{end}}
